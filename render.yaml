# Render Blueprint — production + staging environments
# https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this file to your repo
#   2. Go to Render Dashboard → Blueprints → New Blueprint Instance
#   3. Select this repo — Render will create both services
#   4. Fill in the env var values in the Render dashboard
#
# Data sharing:
#   - Provider smoke credentials (DataForSEO, Google OAuth, PageSpeed) are
#     environment-specific. Staging must never reuse production credentials.
#   - Other shared service keys remain in the shared groups below.
#   - File-based state (workspaces, audits, approvals) lives on each
#     service's persistent disk. To seed staging with production data,
#     use: render ssh into prod → tar the data dir → scp to staging.
#   - Stripe uses TEST keys on staging so payments are sandboxed.

services:
  # ── Production ──
  - type: web
    name: asset-dashboard
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: node scripts/ensure-native-modules.mjs && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.12.0
      - key: DATA_DIR
        value: /var/data/asset-dashboard
      - key: PORT
        value: "3001"
      - key: APP_URL
        sync: false  # set in dashboard
      - key: APP_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_REDIRECT_URI
        sync: false  # differs per environment
      - key: GOOGLE_BUSINESS_PROFILE_REDIRECT_URI
        sync: false  # production GBP callback URL
      - key: GOOGLE_OAUTH_ENCRYPTION_KEY
        sync: false  # preserve the existing production encryption key; never rotate casually
      - key: GOOGLE_OAUTH_STATE_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false  # live keys for prod
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - fromGroup: shared-api-keys
      - fromGroup: production-provider-credentials
      - fromGroup: shared-smtp
      - fromGroup: shared-sentry
      - fromGroup: shared-turnstile
      - fromGroup: shared-s3-backups
    disk:
      name: asset-dashboard-data
      mountPath: /var/data/asset-dashboard
      sizeGB: 1

  # ── Staging ──
  - type: web
    name: asset-dashboard-staging
    runtime: node
    region: oregon
    plan: starter
    branch: staging
    buildCommand: npm ci && npm run build
    startCommand: node scripts/ensure-native-modules.mjs && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROVIDER_ENV_PROFILE
        value: staging
      - key: LOCAL_FAKE_PROVIDERS
        value: "false"
      - key: NODE_VERSION
        value: 24.12.0
      - key: DATA_DIR
        value: /var/data/asset-dashboard
      - key: PORT
        value: "3001"
      - key: APP_URL
        sync: false  # e.g. https://asset-dashboard-staging.onrender.com
      - key: APP_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_REDIRECT_URI
        sync: false  # staging callback URL
      - key: GOOGLE_BUSINESS_PROFILE_REDIRECT_URI
        sync: false  # staging GBP callback URL
      - key: GOOGLE_OAUTH_ENCRYPTION_KEY
        sync: false  # stable and unique to staging; never copy production ciphertext/tokens
      - key: GOOGLE_OAUTH_STATE_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false  # test keys for staging
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - fromGroup: shared-api-keys
      - fromGroup: staging-provider-credentials
      - fromGroup: shared-smtp
      - fromGroup: shared-sentry
      - fromGroup: shared-turnstile
      - fromGroup: shared-s3-backups
    disk:
      name: asset-dashboard-staging-data
      mountPath: /var/data/asset-dashboard
      sizeGB: 1

# Environment groups — shared service keys plus isolated provider credentials
envVarGroups:
  - name: shared-api-keys
    envVars:
      - key: WEBFLOW_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
  - name: production-provider-credentials
    envVars:
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_PSI_KEY
        sync: false
  - name: staging-provider-credentials
    envVars:
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_PSI_KEY
        sync: false
  - name: shared-smtp
    envVars:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
  - name: shared-sentry
    envVars:
      - key: SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
  - name: shared-turnstile
    envVars:
      - key: VITE_TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
  - name: shared-s3-backups
    envVars:
      # Local on-disk backup retention in days (default 3 when unset). Kept tight because
      # local backups share the same disk as the live DB — see server/backup.ts.
      - key: BACKUP_RETENTION_DAYS
        sync: false
      - key: BACKUP_S3_BUCKET
        sync: false
      - key: BACKUP_S3_REGION
        sync: false
      # Optional — set for S3-compatible providers (e.g. Cloudflare R2). When set, the
      # S3Client is constructed with this endpoint + forcePathStyle: true.
      - key: BACKUP_S3_ENDPOINT
        sync: false
      # Off-site retention in days (default 30 when unset). Independent of
      # BACKUP_RETENTION_DAYS, which controls local on-disk retention — see server/backup.ts.
      - key: BACKUP_S3_RETENTION_DAYS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
