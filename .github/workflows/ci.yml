name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Husky hook installation is useful for developer machines but pure CI overhead.
  HUSKY: 0

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      quality: ${{ steps.filter.outputs.quality }}
      test: ${{ steps.filter.outputs.test }}
      coverage: ${{ steps.filter.outputs.coverage }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            quality:
              - 'src/**'
              - 'server/**'
              - 'shared/**'
              - 'tests/**'
              - 'scripts/**'
              - 'data/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'playwright*.ts'
            test:
              - 'src/**'
              - 'server/**'
              - 'shared/**'
              - 'tests/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'playwright*.ts'
            coverage:
              - 'src/**'
              - 'server/**'
              - 'shared/**'
              - 'tests/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'playwright*.ts'

  quality:
    needs: changes
    if: needs.changes.outputs.quality == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # HEAD + HEAD~1 so pr-check.ts can diff on push events

      # On PRs, also fetch the base branch so pr-check.ts can use `git diff origin/<base>...HEAD`.
      # `|| true` prevents a transient git failure from killing CI —
      # pr-check.ts falls back to a full codebase scan gracefully.
      - name: Fetch base branch for diff
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF:refs/remotes/origin/$BASE_REF" --depth=1 || true

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Cache the fully-installed node_modules (including the compiled
      # better-sqlite3 / sharp native binaries) keyed on the exact lockfile.
      # setup-node's `cache: npm` only restores the download cache (~/.npm) —
      # npm ci still rebuilds node_modules from scratch every run. Skipping that
      # rebuild on a hit is the single biggest CI-time lever here because the
      # install cost is paid by every parallel job (quality + 7 test lanes).
      # The key pins OS+arch+node-major so a restored tree can never carry
      # native binaries built for a different platform; bump the v1 token to
      # force a rebuild if a runner-image change ever breaks native ABI compat.
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      # Only reinstall on a cache miss. On a hit, node_modules is already the
      # exact tree for this lockfile, so npm ci would be wasted work. HUSKY=0
      # (job env) makes the skipped `prepare` script a no-op either way.
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Use the npm script, which invokes `tsc -b --noEmit` (project-aware).
      # Plain `tsc --noEmit` against the root tsconfig checks ZERO files
      # because the root config uses project references with `files: []`.
      # See CLAUDE.md "Commands" table for the full explanation.
      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: PR checks
        run: npm run pr-check

      - name: Circular dependency ratchet
        run: npm run check:circular-deps

      - name: Feature flag lifecycle checks
        run: npm run verify:feature-flags

      - name: Verification governance checks
        run: npm run verify:governance

      # Hard correctness gate: a conditionally-called React hook crashes the component at runtime
      # ("Rendered more hooks than during the previous render"). eslint has the rule but was never run
      # in CI; this focused config enforces ONLY react-hooks/rules-of-hooks (no exhaustive-deps noise).
      - name: Rules-of-Hooks lint
        run: npm run lint:hooks

      - name: Style drift checks
        run: npm run verify:style-drift

      - name: Staging merge integrity checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run verify:staging-merge-integrity -- --since-days 180 --blocking-merged-since 2026-05-29

      - name: AI reliability soft gate
        run: npx tsx scripts/report-ai-reliability.ts --soft-gate

      # Phase 2 frozen-paths guard. Only gates branches that are part of the
      # Phase 5 Phase 2 migration cycle (workers + integrator). Non-Phase-2
      # work is unaffected so the check doesn't block unrelated PRs that
      # legitimately touch Phase 1 primitives (e.g. round-3-style polish
      # follow-ups).
      #
      # Pattern: feat/design-system-phase5-2* (workers),
      #          feat/design-system-phase2-integrator* (coordinator).
      # The integrator branch auto-passes --integrator so BRAND_DESIGN_LANGUAGE.md
      # batched doc updates don't trip the check.
      #
      # See docs/superpowers/plans/2026-04-24-phase-2-kickoff.md §5 and
      # scripts/phase2-guard.ts.
      # Branch refs are surfaced via `env:` rather than `${{ }}` interpolation
      # in the run block — `${{ }}` is expanded by the Actions runner before
      # bash sees it, so a head_ref like `feat/design-system-phase$(curl ...)`
      # would shell-inject. Reading from $HEAD_REF / $BASE_REF keeps the value
      # opaque to the shell parser. The `if:` filter is fine — startsWith()
      # is a GitHub-expression-layer call, not passed to bash.
      # See: https://securitylab.github.com/research/github-actions-untrusted-input/
      - name: Phase 2 frozen-paths guard
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'feat/design-system-phase')
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$HEAD_REF" == *"integrator"* || "$HEAD_REF" == *"phase2-integrator"* ]]; then
            echo "[ci] integrator branch — running guard with --integrator"
            npx tsx scripts/phase2-guard.ts --integrator --against="origin/$BASE_REF"
          elif [[ "$HEAD_REF" == feat/design-system-phase5-2* ]]; then
            echo "[ci] Phase 2 worker branch — running strict guard"
            npx tsx scripts/phase2-guard.ts --against="origin/$BASE_REF"
          else
            echo "[ci] Phase 5 branch but not a Phase 2 worker/integrator pattern — skipping guard"
          fi

      # Regenerate docs/rules/automated-rules.md from the CHECKS array in
      # scripts/pr-check.ts and fail if the committed file drifts. This is
      # how CLAUDE.md stays de-duped from the rule engine — see PR C of the
      # 2026-04-10 pr-check audit plan.
      - name: Verify automated-rules.md is in sync
        run: |
          npm run rules:generate
          if ! git diff --exit-code docs/rules/automated-rules.md; then
            echo "::error::docs/rules/automated-rules.md is out of sync. Run 'npm run rules:generate' and commit the result."
            exit 1
          fi

  # Keep PR feedback aligned with Vitest's real project boundaries.
  # The prior mixed 6-way shard pool consistently left one hot lane around
  # 188-195s at the job level, so we split the heaviest projects directly:
  # integration gets 3 lanes, unit and component get 2 each, contract stays discrete.
  # Component is the heaviest jsdom project (~300 files) and was being OOM-killed as a
  # single un-sharded process (killed mid-run, no assertion) — sharding it ×2 halves the
  # per-process memory accumulation, the same way unit/integration are split.
  test-lane:
    name: pr-test (${{ matrix.lane.name }})
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.test == 'true'
    strategy:
      fail-fast: false
      matrix:
        lane:
          - name: component (1/2)
            command: npm run test:component -- --reporter=dot --shard=1/2
          - name: component (2/2)
            command: npm run test:component -- --reporter=dot --shard=2/2
          - name: contract
            command: npm run test:contract -- --reporter=dot
          - name: unit (1/2)
            command: npm run test:unit -- --reporter=dot --shard=1/2
          - name: unit (2/2)
            command: npm run test:unit -- --reporter=dot --shard=2/2
          - name: integration (1/3)
            command: npm run test:integration -- --reporter=dot --shard=1/3
          - name: integration (2/3)
            command: npm run test:integration -- --reporter=dot --shard=2/3
          - name: integration (3/3)
            command: npm run test:integration -- --reporter=dot --shard=3/3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Cache the fully-installed node_modules (including the compiled
      # better-sqlite3 / sharp native binaries) keyed on the exact lockfile.
      # setup-node's `cache: npm` only restores the download cache (~/.npm) —
      # npm ci still rebuilds node_modules from scratch every run. Skipping that
      # rebuild on a hit is the single biggest CI-time lever here because the
      # install cost is paid by every parallel job (quality + 7 test lanes).
      # The key pins OS+arch+node-major so a restored tree can never carry
      # native binaries built for a different platform; bump the v1 token to
      # force a rebuild if a runner-image change ever breaks native ABI compat.
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      # Only reinstall on a cache miss. On a hit, node_modules is already the
      # exact tree for this lockfile, so npm ci would be wasted work. HUSKY=0
      # (job env) makes the skipped `prepare` script a no-op either way.
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests (${{ matrix.lane.name }})
        run: ${{ matrix.lane.command }}

  test:
    if: ${{ always() && !cancelled() && github.event_name == 'pull_request' }}
    needs: [changes, test-lane]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required PR test lanes passed
        env:
          TEST_NEEDED: ${{ needs.changes.outputs.test }}
          TEST_LANE_RESULT: ${{ needs.test-lane.result }}
        run: |
          echo "test needed:   $TEST_NEEDED"
          echo "lane result:   $TEST_LANE_RESULT"
          if [[ "$TEST_NEEDED" == "true" && "$TEST_LANE_RESULT" != "success" ]]; then
            echo "::error::PR test lanes failed"
            exit 1
          fi

  coverage:
    needs: changes
    # Full-suite coverage takes ~20 minutes and is intentionally not part of
    # automatic PR, staging, or main push CI. Run this workflow manually before
    # a release when a fresh ratchet summary is needed; normal merges stay
    # covered by fast quality gates plus PR test lanes.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Cache the fully-installed node_modules (including the compiled
      # better-sqlite3 / sharp native binaries) keyed on the exact lockfile.
      # setup-node's `cache: npm` only restores the download cache (~/.npm) —
      # npm ci still rebuilds node_modules from scratch every run. Skipping that
      # rebuild on a hit is the single biggest CI-time lever here because the
      # install cost is paid by every parallel job (quality + 7 test lanes).
      # The key pins OS+arch+node-major so a restored tree can never carry
      # native binaries built for a different platform; bump the v1 token to
      # force a rebuild if a runner-image change ever breaks native ABI compat.
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      # Only reinstall on a cache miss. On a hit, node_modules is already the
      # exact tree for this lockfile, so npm ci would be wasted work. HUSKY=0
      # (job env) makes the skipped `prepare` script a no-op either way.
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Enforce coverage ratchet guardrails
        run: npm run verify:coverage-ratchet

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-artifacts
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
          retention-days: 14

  check:
    if: ${{ always() && !cancelled() }}
    needs: [changes, quality, test, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required CI jobs passed
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          QUALITY_NEEDED: ${{ needs.changes.outputs.quality }}
          TEST_NEEDED: ${{ needs.changes.outputs.test }}
          COVERAGE_NEEDED: ${{ needs.changes.outputs.coverage }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.test.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
        run: |
          echo "quality needed:  $QUALITY_NEEDED"
          echo "test needed:     $TEST_NEEDED"
          echo "coverage needed: $COVERAGE_NEEDED"
          echo "ref:      $REF_NAME"
          echo "quality:  $QUALITY_RESULT"
          echo "test:     $TEST_RESULT"
          echo "coverage: $COVERAGE_RESULT"

          if [[ "$QUALITY_NEEDED" == "true" && "$QUALITY_RESULT" != "success" ]]; then
            echo "::error::quality job failed"
            exit 1
          fi

          if [[ "$EVENT_NAME" == "pull_request" && "$TEST_NEEDED" == "true" && "$TEST_RESULT" != "success" ]]; then
            echo "::error::test job failed"
            exit 1
          fi

          echo "coverage is manual-only; failed manual coverage runs fail via the coverage job itself"
