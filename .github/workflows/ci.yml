name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for pr-check.ts diff detection

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Fetch base branch for PR diff
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}

      - name: PR checks
        run: npx tsx scripts/pr-check.ts
