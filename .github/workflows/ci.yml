name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # HEAD + HEAD~1 so pr-check.ts can diff on push events

      # On PRs, also fetch the base branch so pr-check.ts can use `git diff origin/<base>...HEAD`.
      # `|| true` prevents a transient git failure from killing CI —
      # pr-check.ts falls back to a full codebase scan gracefully.
      - name: Fetch base branch for diff
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }} --depth=1 || true

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Use the npm script, which invokes `tsc -b --noEmit` (project-aware).
      # Plain `tsc --noEmit` against the root tsconfig checks ZERO files
      # because the root config uses project references with `files: []`.
      # See CLAUDE.md "Commands" table for the full explanation.
      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: PR checks
        run: npm run pr-check

      # Regenerate docs/rules/automated-rules.md from the CHECKS array in
      # scripts/pr-check.ts and fail if the committed file drifts. This is
      # how CLAUDE.md stays de-duped from the rule engine — see PR C of the
      # 2026-04-10 pr-check audit plan.
      - name: Verify automated-rules.md is in sync
        run: |
          npm run rules:generate
          if ! git diff --exit-code docs/rules/automated-rules.md; then
            echo "::error::docs/rules/automated-rules.md is out of sync. Run 'npm run rules:generate' and commit the result."
            exit 1
          fi
