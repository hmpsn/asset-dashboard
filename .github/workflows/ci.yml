name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # HEAD + HEAD~1 so pr-check.ts can diff on push events

      # On PRs, also fetch the base branch so pr-check.ts can use `git diff origin/<base>...HEAD`.
      # `|| true` prevents a transient git failure from killing CI —
      # pr-check.ts falls back to a full codebase scan gracefully.
      - name: Fetch base branch for diff
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }} --depth=1 || true

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Use the npm script, which invokes `tsc -b --noEmit` (project-aware).
      # Plain `tsc --noEmit` against the root tsconfig checks ZERO files
      # because the root config uses project references with `files: []`.
      # See CLAUDE.md "Commands" table for the full explanation.
      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: PR checks
        run: npm run pr-check

      # Phase 2 frozen-paths guard. Only gates branches that are part of the
      # Phase 5 Phase 2 migration cycle (workers + integrator). Non-Phase-2
      # work is unaffected so the check doesn't block unrelated PRs that
      # legitimately touch Phase 1 primitives (e.g. round-3-style polish
      # follow-ups).
      #
      # Pattern: feat/design-system-phase5-2* (workers),
      #          feat/design-system-phase2-integrator* (coordinator).
      # The integrator branch auto-passes --integrator so BRAND_DESIGN_LANGUAGE.md
      # batched doc updates don't trip the check.
      #
      # See docs/superpowers/plans/2026-04-24-phase-2-kickoff.md §5 and
      # scripts/phase2-guard.ts.
      # Branch refs are surfaced via `env:` rather than `${{ }}` interpolation
      # in the run block — `${{ }}` is expanded by the Actions runner before
      # bash sees it, so a head_ref like `feat/design-system-phase$(curl ...)`
      # would shell-inject. Reading from $HEAD_REF / $BASE_REF keeps the value
      # opaque to the shell parser. The `if:` filter is fine — startsWith()
      # is a GitHub-expression-layer call, not passed to bash.
      # See: https://securitylab.github.com/research/github-actions-untrusted-input/
      - name: Phase 2 frozen-paths guard
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'feat/design-system-phase')
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$HEAD_REF" == *"integrator"* || "$HEAD_REF" == *"phase2-integrator"* ]]; then
            echo "[ci] integrator branch — running guard with --integrator"
            npx tsx scripts/phase2-guard.ts --integrator --against="origin/$BASE_REF"
          elif [[ "$HEAD_REF" == feat/design-system-phase5-2* ]]; then
            echo "[ci] Phase 2 worker branch — running strict guard"
            npx tsx scripts/phase2-guard.ts --against="origin/$BASE_REF"
          else
            echo "[ci] Phase 5 branch but not a Phase 2 worker/integrator pattern — skipping guard"
          fi

      # Regenerate docs/rules/automated-rules.md from the CHECKS array in
      # scripts/pr-check.ts and fail if the committed file drifts. This is
      # how CLAUDE.md stays de-duped from the rule engine — see PR C of the
      # 2026-04-10 pr-check audit plan.
      - name: Verify automated-rules.md is in sync
        run: |
          npm run rules:generate
          if ! git diff --exit-code docs/rules/automated-rules.md; then
            echo "::error::docs/rules/automated-rules.md is out of sync. Run 'npm run rules:generate' and commit the result."
            exit 1
          fi
