name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # HEAD + HEAD~1 so pr-check.ts can diff on push events

      # On PRs, also fetch the base branch so pr-check.ts can use `git diff origin/<base>...HEAD`.
      # `|| true` prevents a transient git failure from killing CI —
      # pr-check.ts falls back to a full codebase scan gracefully.
      - name: Fetch base branch for diff
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }} --depth=1 || true

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: PR checks
        run: npx tsx scripts/pr-check.ts
