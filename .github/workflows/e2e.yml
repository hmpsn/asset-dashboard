name: E2E

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

# Spend policy (mirrors ci.yml's test matrix):
#   - The heavy e2e jobs (build + Playwright shards + report merge) run on
#     PULL REQUESTS ONLY. A push to main/staging does NOT re-run e2e — the PR
#     that produced the commit already ran it on the same code, and the `quality`
#     job in ci.yml still re-validates typecheck/build/pr-check on the push.
#   - On a push event the `changes` + `e2e` status jobs still run (cheap) so the
#     `e2e` required-status check keeps reporting green; it short-circuits when
#     the event is not a pull_request.
#   - All npm-ci jobs reuse the lockfile-keyed node_modules cache SHARED with
#     ci.yml (identical key), so the native better-sqlite3/sharp rebuild is paid
#     at most once per lockfile instead of 4x per e2e run.

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v5

      - name: Detect E2E-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            e2e:
              - 'src/**'
              - 'server/**'
              - 'shared/**'
              - 'tests/e2e/**'
              - 'playwright.config.ts'
              - 'playwright.visual.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/e2e.yml'

  e2e-build:
    needs: changes
    # PR-only (spend policy above): never re-run on main/staging push.
    if: needs.changes.outputs.e2e == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Reuse the lockfile-keyed node_modules cache shared with ci.yml (same key)
      # so the native better-sqlite3/sharp rebuild is paid at most once per
      # lockfile, not on every e2e job. See ci.yml for the full rationale.
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: e2e-dist
          path: dist/
          retention-days: 2

  e2e-shard:
    needs: [changes, e2e-build]
    # PR-only (spend policy above): never re-run on main/staging push.
    if: needs.changes.outputs.e2e == 'true' && github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    env:
      DATA_DIR: /tmp/asset-dashboard-ci
      LOG_LEVEL: warn
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      INTEGRATION_CONFIG_KEY: e2e-ci-integration-config-key
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: e2e-dist
          path: dist/

      # Reuse the lockfile-keyed node_modules cache shared with ci.yml (same key).
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$PLAYWRIGHT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create data directory
        run: mkdir -p $DATA_DIR

      - name: Run Playwright tests
        run: npx playwright test --reporter=blob --shard=${{ matrix.shard }}/2
        env:
          CI: true
          JWT_SECRET: e2e-test-secret

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  e2e-merge-report:
    needs: [changes, e2e-shard]
    # PR-only (spend policy above): never re-run on main/staging push.
    if: needs.changes.outputs.e2e == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Reuse the lockfile-keyed node_modules cache shared with ci.yml (same key).
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Download shard blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-shard-*
          path: all-blob-reports/

      - name: Prepare shard blob reports
        run: |
          mkdir -p merged-blob-reports
          find all-blob-reports -name '*.zip' -type f -exec cp {} merged-blob-reports/ \;
          test -n "$(find merged-blob-reports -name '*.zip' -type f -print -quit)"

      - name: Merge shard reports
        run: npx playwright merge-reports --reporter=html ./merged-blob-reports

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 14

  e2e:
    name: e2e
    if: always()
    needs: [changes, e2e-build, e2e-shard, e2e-merge-report]
    runs-on: ubuntu-latest
    steps:
      - name: E2E status check
        env:
          EVENT_NAME: ${{ github.event_name }}
          E2E_NEEDED: ${{ needs.changes.outputs.e2e }}
          BUILD_RESULT: ${{ needs.e2e-build.result }}
          SHARD_RESULT: ${{ needs.e2e-shard.result }}
          MERGE_RESULT: ${{ needs.e2e-merge-report.result }}
        run: |
          echo "event:        $EVENT_NAME"
          echo "e2e needed:   $E2E_NEEDED"
          echo "build result: $BUILD_RESULT"
          echo "shard result: $SHARD_RESULT"
          echo "merge result: $MERGE_RESULT"
          # e2e is PR-only (spend policy). On any non-PR event (e.g. push to
          # main/staging) the heavy jobs are intentionally skipped, so this
          # status check passes trivially — the PR already ran e2e on this code.
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "e2e is PR-only; skipping enforcement on $EVENT_NAME event."
            exit 0
          fi
          if [[ "$E2E_NEEDED" != "true" ]]; then
            echo "Skipping E2E: no E2E-relevant file changes detected."
            exit 0
          fi
          if [[ "$BUILD_RESULT" != "success" ]]; then
            echo "::error::E2E build job failed"
            exit 1
          fi
          if [[ "$SHARD_RESULT" != "success" ]]; then
            echo "::error::E2E shard job failed"
            exit 1
          fi
          if [[ "$MERGE_RESULT" != "success" ]]; then
            echo "::error::E2E report merge job failed"
            exit 1
          fi
