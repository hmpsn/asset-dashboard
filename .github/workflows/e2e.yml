name: E2E

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
    # `ready_for_review` so marking a draft PR ready triggers e2e (it is draft-gated below).
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

# Spend policy (mirrors ci.yml's test matrix):
#   - The heavy e2e jobs (build + Playwright shards + report merge) run on
#     NON-DRAFT PULL REQUESTS ONLY. A push to main/staging does NOT re-run e2e
#     (the PR already ran it; ci.yml's `quality` still re-validates on push), and
#     a DRAFT PR skips e2e too — mark the PR "ready for review" to run it. You
#     cannot merge a draft, so e2e always runs before a merge.
#   - On a push / draft / no-change event the `changes` + `e2e` status jobs still
#     run (cheap) so the `e2e` status check keeps reporting; the status job only
#     fails on a real job `failure`, never on an intentional skip.
#   - All npm-ci jobs reuse the lockfile-keyed node_modules cache SHARED with
#     ci.yml (identical key), so the native better-sqlite3/sharp rebuild is paid
#     at most once per lockfile instead of 4x per e2e run.

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      e2e: ${{ steps.changes.outputs.e2e }}
    steps:
      - uses: actions/checkout@v5

      - name: Detect E2E-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        continue-on-error: true
        with:
          filters: |
            e2e:
              - 'src/**'
              - 'server/**'
              - 'shared/**'
              - 'tests/e2e/**'
              - 'playwright.config.ts'
              - 'playwright.visual.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/e2e.yml'

      # Keep E2E conservative when GitHub's PR-files API is unavailable: mark
      # the lane relevant so a ready PR validates it instead of failing or
      # silently skipping the suite.
      - name: Resolve changed-path output
        id: changes
        if: always()
        env:
          FILTER_OUTCOME: ${{ steps.filter.outcome }}
          E2E_CHANGED: ${{ steps.filter.outputs.e2e }}
        run: |
          if [[ "$FILTER_OUTCOME" != "success" ]]; then
            echo "::warning::Changed-path detection failed; treating E2E as required."
            echo "e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "e2e=${E2E_CHANGED:-false}" >> "$GITHUB_OUTPUT"
          fi

  e2e-build:
    needs: changes
    # Spend policy: e2e-relevant changes, on a pull_request, that is NOT a draft.
    if: needs.changes.outputs.e2e == 'true' && github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Reuse the lockfile-keyed node_modules cache shared with ci.yml (same key)
      # so the native better-sqlite3/sharp rebuild is paid at most once per
      # lockfile, not on every e2e job. See ci.yml for the full rationale.
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: e2e-dist
          path: dist/
          retention-days: 2

  e2e-shard:
    needs: [changes, e2e-build]
    # Spend policy: e2e-relevant changes, on a pull_request, that is NOT a draft.
    if: needs.changes.outputs.e2e == 'true' && github.event_name == 'pull_request' && github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    env:
      DATA_DIR: /tmp/asset-dashboard-ci
      LOG_LEVEL: warn
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      INTEGRATION_CONFIG_KEY: e2e-ci-integration-config-key
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: e2e-dist
          path: dist/

      # Reuse the lockfile-keyed node_modules cache shared with ci.yml (same key).
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$PLAYWRIGHT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create data directory
        run: mkdir -p $DATA_DIR

      - name: Run Playwright tests
        run: npx playwright test --reporter=blob --shard=${{ matrix.shard }}/2
        env:
          CI: true
          JWT_SECRET: e2e-test-secret

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  e2e-merge-report:
    needs: [changes, e2e-shard]
    # Spend policy: e2e-relevant changes, on a pull_request, that is NOT a draft.
    if: needs.changes.outputs.e2e == 'true' && github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Reuse the lockfile-keyed node_modules cache shared with ci.yml (same key).
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Download shard blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-shard-*
          path: all-blob-reports/

      - name: Prepare shard blob reports
        run: |
          mkdir -p merged-blob-reports
          find all-blob-reports -name '*.zip' -type f -exec cp {} merged-blob-reports/ \;
          test -n "$(find merged-blob-reports -name '*.zip' -type f -print -quit)"

      - name: Merge shard reports
        run: npx playwright merge-reports --reporter=html ./merged-blob-reports

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 14

  e2e:
    name: e2e
    if: always()
    needs: [changes, e2e-build, e2e-shard, e2e-merge-report]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: E2E status check
        env:
          EVENT_NAME: ${{ github.event_name }}
          E2E_NEEDED: ${{ needs.changes.outputs.e2e }}
          BUILD_RESULT: ${{ needs.e2e-build.result }}
          SHARD_RESULT: ${{ needs.e2e-shard.result }}
          MERGE_RESULT: ${{ needs.e2e-merge-report.result }}
        run: |
          echo "event:             $EVENT_NAME"
          echo "e2e needed:        $E2E_NEEDED"
          echo "build/shard/merge: $BUILD_RESULT / $SHARD_RESULT / $MERGE_RESULT"
          # The heavy e2e jobs are skipped (result: skipped) on a non-PR push, when
          # no e2e-relevant paths changed, OR on a DRAFT PR (spend policy) — all
          # intentional, so only a real 'failure' blocks. Mark a draft PR "ready
          # for review" to run e2e and produce success/failure.
          for r in "$BUILD_RESULT" "$SHARD_RESULT" "$MERGE_RESULT"; do
            if [[ "$r" == "failure" ]]; then
              echo "::error::E2E failed (build=$BUILD_RESULT shard=$SHARD_RESULT merge=$MERGE_RESULT)"
              exit 1
            fi
          done
          echo "e2e ok (passed or intentionally skipped)."
